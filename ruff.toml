# Exclude a variety of commonly ignored directories.
exclude = [ #
	".bzr",
	".direnv",
	".eggs",
	".git",
	".git-rewrite",
	".hg",
	".ipynb_checkpoints",
	".mypy_cache",
	".nox",
	".pants.d",
	".pyenv",
	".pytest_cache",
	".pytype",
	".ruff_cache",
	".svn",
	".tox",
	".venv",
	"venv",
	".vscode",
	"__pypackages__",
	"_build",
	"buck-out",
	"build",
	"dist",
	"node_modules",
	"site-packages",
]

line-length  = 150
indent-width = 4

target-version = "py314"

[format]
quote-style  = "double"
indent-style = "tab"

nested-string-quote-style = "preferred"

skip-magic-trailing-comma = false

line-ending = "auto"

docstring-code-format      = true
docstring-code-line-length = "dynamic"

[lint]
# Allow select greek letters
allowed-confusables = ["α", "β", "γ", "δ", "ε", "ζ", "η", "θ", "κ", "λ", "μ", "ξ", "π", "σ", "ς", "τ", "φ", "ψ", "ω", "Γ", "Δ", "Π", "Σ", "Ω"]

preview = true

pydocstyle.convention = "google"
# (using: )
#
# Args:
#    whatever
#
# (instead of: )
#
# Args
# ----
# whatever

flake8-annotations.suppress-dummy-args     = true
flake8-annotations.suppress-none-returning = true

extend-per-file-ignores = { "tests/**/*.py" = ["ANN"], "test*.py" = ["ANN"] } # don't require annotations for tests

